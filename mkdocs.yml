site_name: Wall Reinforcement Wizard
site_url: https://evgenijbg-netizen.github.io/WallReinf-wiki/

theme:
  name: material
  language: cs
  logo: assets/logo.png
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Přepnout na tmavý režim
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Přepnout na světlý režim
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang: cs
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

nav:
  - Domů: index.md
  - Průvodce:
    - pruvodce/index.md
    - Požadavky: pruvodce/pozadavky.md
    - Instalace: pruvodce/instalace.md
    - Připojení k modelu: pruvodce/pripojeni.md
    - Základní workflow: pruvodce/zakladni-workflow.md
    - Hlavní parametry: pruvodce/parametry.md
    - Otvory: pruvodce/otvory.md
    - Třmínky: pruvodce/trminky.md
    - Diagonální pruty: pruvodce/diagonaly.md
    - Preview panel: pruvodce/preview.md
    - Validační okno: pruvodce/validace.md
    - PDF export: pruvodce/pdf-export.md
  - Reference:
    - reference/index.md
    - Parametry: reference/parametry.md
  - FAQ: faq.md
